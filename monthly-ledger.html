<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Ledger</title>
<link rel="manifest" href="ledger-manifest.json">
<meta name="theme-color" content="#0B2340">
<link rel="apple-touch-icon" href="icon-finances-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: linear-gradient(180deg, #0C2444 0%, #081B33 100%); color: #EAF2FB;
    font-family: 'Inter', sans-serif; font-weight: 500;
  }
  .content { max-width: 560px; margin: 0 auto; padding: 28px 16px 48px; }
  .eyebrow { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1.5px; color: #6EB6F5; margin-bottom: 4px; }
  .month-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 18px; }
  .summary-card { background: #17396A; border: 1px solid rgba(93,169,233,0.3); border-radius: 14px; padding: 20px 18px 16px; margin-bottom: 22px; box-shadow: 0 10px 28px rgba(0,0,0,0.3); }
  .balance-hero { text-align: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .balance-value { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 36px; margin-top: 3px; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-chip { flex: 1; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 12px; }
  .stat-value { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 19px; margin-top: 2px; }
  .summary-label-input { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 10.5px; letter-spacing: 1px; color: #8FB8DE; margin-bottom: 4px; background: transparent; border: none; border-bottom: 1px solid transparent; outline: none; width: 100%; padding: 1px 0; text-transform: uppercase; }
  .summary-label-input.center { text-align: center; }
  .summary-label-input:focus { border-bottom-color: #5DA9E9; }
  .balance-value-row { display: flex; align-items: baseline; justify-content: center; gap: 4px; }
  .currency-big { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 26px; color: #EAF2FB; }
  .balance-value { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 36px; margin-top: 3px; background: transparent; border: none; outline: none; color: #4FAE7A; width: 180px; text-align: center; padding: 0; }
  .stat-value-row { display: flex; align-items: baseline; gap: 3px; }
  .currency-sm { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: #7FA8C9; }
  .stat-value { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 19px; margin-top: 2px; background: transparent; border: none; outline: none; width: 90px; padding: 0; }
  .reset-override-btn { display: none; background: transparent; border: none; color: #5A7DA0; font-size: 13px; cursor: pointer; padding: 0 2px; }
  .reset-override-btn.visible { display: inline-block; }
  .progress-track { height: 6px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#5DA9E9,#4FAE7A); border-radius: 4px; transition: width .3s ease; }
  .progress-caption { margin-top: 10px; font-size: 12px; color: #7FA8C9; font-family: 'IBM Plex Mono', monospace; display: flex; flex-direction: column; gap: 4px; }
  .caption-item { display: flex; align-items: baseline; gap: 7px; }
  .caption-dot { color: #5DA9E9; flex-shrink: 0; }
  .section-header { display: flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; color: #8FB8DE; margin: 18px 2px 8px; cursor: pointer; user-select: none; }
  .section-chevron { font-size: 12px; }
  .adjustment-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.12); }
  .adj-icon { font-size: 14px; }
  .adj-label-input { flex: 1; min-width: 0; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.12); color: #C9B6EA; font-family: 'Inter', sans-serif; font-size: 12px; padding: 3px 2px; outline: none; }
  .adj-label-input:focus { border-bottom-color: #B18CE8; }
  .scan-btn { background: transparent; border: 1px dashed rgba(93,169,233,0.3); color: #5DA9E9; font-size: 12px; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .scan-status { font-size: 11.5px; color: #8FB8DE; font-family: 'Inter', sans-serif; font-weight: 500; margin-top: 4px; }
  .item-add-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item-receipt-thumb { width: 26px; height: 26px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); background-size: cover; background-position: center; flex-shrink: 0; cursor: pointer; padding: 0; }
  .receipt-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: none; align-items: center; justify-content: center; padding: 24px; }
  .receipt-lightbox.open { display: flex; }
  .receipt-lightbox img { max-width: 100%; max-height: 85vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  .receipt-lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.12); border: none; color: #EAF2FB; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; }
  .group-wrapper { margin-bottom: 6px; }
  .group-header { display: flex; align-items: center; gap: 8px; background: #17396A; border: 1px solid rgba(93,169,233,0.3); border-radius: 10px; padding: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.18); }
  .group-subtotal { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #4FAE7A; flex-shrink: 0; }
  .group-body { display: none; flex-direction: column; gap: 6px; padding: 8px 0 2px 22px; }
  .group-body.open { display: flex; }
  .group-select { background: #17385F; color: #EAF2FB; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; font-size: 12px; padding: 6px; font-family: 'Inter', sans-serif; }
  .analysis-block { margin-bottom: 20px; }
  .analysis-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11.5px; letter-spacing: 0.5px; color: #6EB6F5; margin-bottom: 8px; }
  .analysis-subnote { font-size: 11.5px; color: #7FA8C9; font-family: 'Inter', sans-serif; font-weight: 500; margin-top: 6px; }
  .analysis-empty { font-size: 12.5px; color: #7FA8C9; font-family: 'Inter', sans-serif; font-weight: 500; padding: 6px 0; }
  .cat-bar-row { margin-bottom: 9px; }
  .cat-bar-label { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 3px; }
  .cat-bar-track { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg,#5DA9E9,#E8A33D); }
  .ghost-summary-card { background: rgba(177,140,232,0.08); border: 1px solid rgba(177,140,232,0.25); border-radius: 10px; padding: 10px 12px; font-size: 12.5px; color: #C9B6EA; line-height: 1.5; }
  .ghost-summary-card b { color: #EAF2FB; }
  .budget-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .budget-name { flex: 1; min-width: 0; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .budget-input { width: 56px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.15); color: #EAF2FB; font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 2px; text-align: right; outline: none; }
  .budget-delta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; min-width: 64px; text-align: right; flex-shrink: 0; }
  .reliability-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); gap: 8px; }
  .reliability-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reliability-pct { font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }
  .trend-chart-wrap { overflow-x: auto; }
  .trend-legend { display: flex; gap: 14px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; margin-top: 8px; flex-wrap: wrap; }
  .trend-legend-item { display: flex; align-items: center; gap: 4px; color: #7FA8C9; }
  .trend-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .list-wrap { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 8px; background: #17385F; border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; padding: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.18); }
  .icon-wrap { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; background: rgba(93,169,233,0.1); }
  .icon-wrap.received, .icon-wrap.paid { background: rgba(79,174,122,0.15); }
  .row-main { flex: 1; min-width: 0; }
  .name-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.12); color: #EAF2FB; font-family: 'Inter', sans-serif; font-size: 14.5px; font-weight: 600; padding: 2px; outline: none; }
  .name-input:focus { border-bottom-color: #5DA9E9; }
  .due-row { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
  .due-label { font-size: 10.5px; color: #7FA8C9; font-family: 'Inter', sans-serif; font-weight: 500; }
  .due-input { width: 28px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: #7FA8C9; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; padding: 0; outline: none; }
  .amount-wrap { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .currency { color: #5A7DA0; font-size: 13px; font-family: 'IBM Plex Mono', monospace; }
  .amount-input { width: 58px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.15); color: #EAF2FB; font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px; padding: 2px; text-align: right; outline: none; }
  .amount-input:focus { border-bottom-color: #5DA9E9; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .stamp-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.25); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: #0B2340; font-weight: 800; font-size: 13px; }
  .stamp-btn.on { background: #4FAE7A; border-color: #4FAE7A; }
  .remove-btn { background: transparent; border: none; cursor: pointer; padding: 2px; color: #7FA8C9; font-size: 14px; flex-shrink: 0; display: none; }
  body.edit-mode .remove-btn { display: inline-flex; align-items: center; justify-content: center; }
  .move-col { display: none; flex-direction: column; gap: 2px; flex-shrink: 0; }
  body.edit-mode .move-col { display: flex; }
  .move-btn { background: rgba(255,255,255,0.06); border: none; color: #7FA8C9; font-size: 9px; line-height: 1; cursor: pointer; padding: 3px; border-radius: 3px; width: 16px; }
  .move-btn:active { background: rgba(93,169,233,0.3); }
  .move-btn:disabled { opacity: 0.25; cursor: default; }
  .edit-toggle-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
  .edit-toggle-btn { background: transparent; border: 1px solid rgba(93,169,233,0.3); color: #7FA8C9; font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 5px; }
  body.edit-mode .edit-toggle-btn { background: rgba(232,163,61,0.15); border-color: #E8A33D; color: #E8A33D; }
  .chevron-btn { background: transparent; border: none; cursor: pointer; color: #5A7DA0; font-size: 13px; width: 18px; flex-shrink: 0; padding: 0; }
  .items-count { font-size: 10.5px; color: #5A7DA0; font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .items-panel { display: none; flex-direction: column; gap: 5px; background: #0F2C50; border: 1px solid rgba(255,255,255,0.09); border-top: none; border-radius: 0 0 10px 10px; padding: 8px 10px 10px 40px; margin-top: -8px; margin-bottom: 2px; }
  .items-panel.open { display: flex; }
  .item-row { display: flex; align-items: center; gap: 8px; }
  .item-desc-input { flex: 1; min-width: 0; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: #C7D9EC; font-family: 'Inter', sans-serif; font-size: 13px; padding: 3px 2px; outline: none; }
  .item-desc-input:focus { border-bottom-color: #5DA9E9; }
  .item-remove-btn { background: transparent; border: none; cursor: pointer; padding: 2px; color: #5A7DA0; font-size: 12px; flex-shrink: 0; }
  .item-add-btn { background: transparent; border: 1px dashed rgba(93,169,233,0.3); color: #5DA9E9; font-size: 12px; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; align-self: flex-start; margin-top: 2px; }
  .item-subtotal { font-size: 11px; color: #7FA8C9; font-family: 'IBM Plex Mono', monospace; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 6px; }
  .amount-input[readonly] { color: #7FA8C9; }
  .add-card { display: flex; align-items: center; gap: 8px; background: #17385F; border: 1px dashed rgba(93,169,233,0.4); border-radius: 10px; padding: 10px; margin-bottom: 12px; }
  .add-input-name { flex: 1; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.15); color: #EAF2FB; font-size: 14px; padding: 2px; outline: none; font-family: 'Inter', sans-serif; }
  .add-confirm { background: #5DA9E9; color: #0B2340; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .add-cancel { background: transparent; border: none; cursor: pointer; color: #7FA8C9; font-size: 14px; }
  .add-row-btn { display: flex; align-items: center; gap: 8px; background: transparent; border: 1px dashed rgba(93,169,233,0.3); border-radius: 10px; padding: 10px 12px; color: #5DA9E9; font-size: 13.5px; cursor: pointer; margin-bottom: 8px; width: 100%; font-family: 'Inter', sans-serif; }
  .add-row-btn.income { border-color: rgba(79,174,122,0.3); color: #4FAE7A; }
  .close-month-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: #1B4B72; border: 1px solid rgba(93,169,233,0.3); border-radius: 10px; padding: 12px; color: #EAF2FB; font-size: 13.5px; font-weight: 500; cursor: pointer; margin-top: 14px; font-family: 'Inter', sans-serif; }
  .close-month-hint { text-align: center; font-size: 11.5px; color: #7FA8C9; margin-top: 8px; margin-bottom: 24px; font-family: 'Inter', sans-serif; font-weight: 500; }
  .history-toggle { display: flex; align-items: center; gap: 8px; background: transparent; border: none; color: #7FA8C9; font-size: 13px; cursor: pointer; padding: 6px 0; font-family: 'Inter', sans-serif; }
  .history-list { margin-top: 10px; display: none; flex-direction: column; gap: 6px; }
  .history-list.open { display: flex; }
  .history-row { display: flex; justify-content: space-between; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 6px 0; font-family: 'IBM Plex Mono', monospace; }
  .history-empty { font-size: 12.5px; color: #7FA8C9; font-family: 'Inter', sans-serif; font-weight: 500; }

<body>
<div class="content">
  <div class="eyebrow" style="display:flex; align-items:center; justify-content:space-between;">
    <span>MONTHLY LEDGER</span>
    <span id="sync-status" style="display:flex; align-items:center; gap:5px; letter-spacing:0;">
      <span id="sync-dot" style="width:7px; height:7px; border-radius:50%; background:#7FA8C9; display:inline-block;"></span>
      <span id="sync-label">connecting…</span>
    </span>
  </div>
  <div class="month-title" id="month-title">—</div>

  <div class="edit-toggle-row">
    <button class="edit-toggle-btn" id="edit-mode-toggle" onclick="toggleEditMode()">✏️ Edit mode: Off</button>
  </div>

  <div class="summary-card">
    <div class="balance-hero">
      <input id="label-balance" class="summary-label-input center" value="BALANCE">
      <div class="balance-value-row">
        <span class="currency-big">$</span><input id="sum-balance" class="balance-value" type="text" inputmode="decimal" placeholder="0">
        <button class="reset-override-btn" id="reset-balance" title="Back to auto-calculated">↺</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-chip">
        <input id="label-income" class="summary-label-input" value="INCOME">
        <div class="stat-value-row">
          <span class="currency-sm">$</span><input id="sum-income" class="stat-value" type="text" inputmode="decimal" placeholder="0" style="color:#4FAE7A;">
          <button class="reset-override-btn" id="reset-income" title="Back to auto-calculated">↺</button>
        </div>
      </div>
      <div class="stat-chip">
        <input id="label-expenses" class="summary-label-input" value="EXPENSES">
        <div class="stat-value-row">
          <span class="currency-sm">$</span><input id="sum-expenses" class="stat-value" type="text" inputmode="decimal" placeholder="0" style="color:#E8A33D;">
          <button class="reset-override-btn" id="reset-expenses" title="Back to auto-calculated">↺</button>
        </div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-caption" id="progress-caption">$0 cash on hand · $0 received · $0 paid</div>
    <div class="adjustment-row">
      <span class="adj-icon">👻</span>
      <input id="adj-label-input" class="adj-label-input" value="Ghost Funds (unaccounted)">
      <div class="amount-wrap"><span class="currency">$</span><input id="adj-amount-input" class="amount-input" type="number" inputmode="decimal" placeholder="0"></div>
    </div>
  </div>

  <div class="section-header" id="income-section-header" onclick="toggleIncomeSection()">
    <span class="section-chevron" id="income-section-chevron">▾</span>
    <span>📈 MONEY IN</span>
  </div>
  <div id="income-section-body">
    <div class="list-wrap" id="income-list"></div>
    <div class="add-card" id="income-add-card" style="display:none; flex-wrap:wrap;">
      <input class="add-input-name" id="income-add-name" placeholder="Income source">
      <div class="amount-wrap"><span class="currency">$</span><input class="amount-input" id="income-add-amount" type="number" inputmode="decimal" placeholder="0"></div>
      <select id="income-add-group" class="group-select"></select>
      <input class="add-input-name" id="income-add-group-new" placeholder="New group name (e.g. Rich's Paychecks)" style="display:none; flex-basis:100%;">
      <button class="add-confirm" onclick="confirmAddIncome()">Add</button>
      <button class="add-cancel" onclick="cancelAddIncome()">✕</button>
    </div>
    <button class="add-row-btn income" id="income-add-toggle" onclick="showAddIncome()">+ Add income source</button>
  </div>

  <div class="section-header">📉 MONEY OUT</div>
  <div class="list-wrap" id="bills-list"></div>
  <div class="add-card" id="bill-add-card" style="display:none;">
    <input class="add-input-name" id="bill-add-name" placeholder="Bill name">
    <div class="amount-wrap"><span class="currency">$</span><input class="amount-input" id="bill-add-amount" type="number" inputmode="decimal" placeholder="0"></div>
    <button class="add-confirm" onclick="confirmAddBill()">Add</button>
    <button class="add-cancel" onclick="cancelAddBill()">✕</button>
  </div>
  <button class="add-row-btn" id="bill-add-toggle" onclick="showAddBill()">+ Add bill</button>

  <div class="section-header" id="analysis-section-header" onclick="toggleAnalysisSection()">
    <span class="section-chevron" id="analysis-section-chevron">▸</span>
    <span>📊 ANALYSIS</span>
  </div>
  <div id="analysis-section-body" style="display:none;"></div>

  <button class="close-month-btn" onclick="closeMonth()">↺ Close month &amp; start new month</button>
  <div class="close-month-hint">Archives this month, resets paid/received stamps, and carries leftover balance into next month as savings income.</div>

  <button class="history-toggle" onclick="toggleHistory()">📒 History (<span id="history-count">0</span>) <span id="history-chevron">▾</span></button>
  <div class="history-list" id="history-list"></div>
  <input type="file" id="receipt-file-input" accept="image/*" capture="environment" style="display:none;">
  <input type="file" id="receipt-upload-input" accept="image/*" style="display:none;">
</div>

<div class="receipt-lightbox" id="receipt-lightbox" onclick="closeReceiptLightbox()">
  <button class="receipt-lightbox-close" onclick="closeReceiptLightbox()">✕</button>
  <img id="receipt-lightbox-img" src="" alt="Receipt photo" onclick="event.stopPropagation()">
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

function guessIcon(name, isIncome){

// Receipt scanning — loads the OCR library only when first used, to keep initial page load light.
let receiptCtx = null;
let tesseractLoadPromise = null;
function loadTesseract(){
  if (window.Tesseract) return Promise.resolve();
  if (tesseractLoadPromise) return tesseractLoadPromise;
  tesseractLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Could not load the scanner library'));
    document.head.appendChild(s);
  });
  return tesseractLoadPromise;
}
function extractTotal(text){
  const lines = text.split('\n');
  let best = null;
  for (const line of lines) {
    if (/sub[\s-]?total/i.test(line)) continue;
    const m = line.match(/total[^0-9]{0,12}\$?\s?(\d{1,5}\.\d{2})/i);
    if (m) best = parseFloat(m[1]);
  }
  if (best != null) return best;
  const all = [...text.matchAll(/\$\s?(\d{1,5}\.\d{2})/g)].map(m => parseFloat(m[1]));
  if (all.length) return Math.max(...all);
  const anyNum = [...text.matchAll(/\b(\d{1,5}\.\d{2})\b/g)].map(m => parseFloat(m[1]));
  return anyNum.length ? Math.max(...anyNum) : null;
}
function extractStoreName(text){
  const junk = [/feedback/i, /survey/i, /thank you/i, /\.com/i, /www\./i, /^id\s*#/i, /https?:/i, /^tel[:\s]/i];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  for (const line of lines.slice(0, 12)) {
    if (junk.some(re => re.test(line))) continue;
    if (line.length < 3) continue;
    const letters = (line.match(/[a-zA-Z]/g) || []).length;
    if (letters < line.length * 0.4) continue; // mostly numbers/symbols — skip (phone #s, IDs, barcodes read as text)
    return line.slice(0, 40);
  }
  return '';
}
function compressImageFile(file, maxDim, quality){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height >= width && height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(null);
      img.src = e.target.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(file);
  });
}
async function handleReceiptFile(file){
  if (!file || !receiptCtx) return;
  const { b, refreshAmountDisplay, renderItemsPanel, statusEl } = receiptCtx;
  statusEl.textContent = 'Attaching photo…';

  const receiptImg = await compressImageFile(file, 500, 0.55);
  if (!b.items) b.items = [];
  const newItem = { id: uid(), desc: '', amount: 0, receiptImg: receiptImg || null };
  b.items.push(newItem);
  saveNow(); refreshAmountDisplay(); renderItemsPanel();

  try {
    statusEl.textContent = 'Loading scanner…';
    await loadTesseract();
    statusEl.textContent = '📷 Reading receipt… this can take a moment';
    const result = await Tesseract.recognize(file, 'eng');
    const text = result.data.text || '';
    const amount = extractTotal(text);
    const store = extractStoreName(text);
    newItem.desc = store || '';
    newItem.amount = amount || 0;
    saveNow(); refreshAmountDisplay(); renderItemsPanel();
    statusEl.textContent = amount
      ? `Filled in "${store || 'Receipt'}" — ${fmt(amount)}. Photo attached — double-check before trusting it.`
      : `Photo attached, but couldn't find a total — enter it manually.`;
  } catch (err) {
    statusEl.textContent = 'Photo attached — scan failed, so enter the details manually.';
    console.error('Receipt scan failed:', err);
  }
}
document.getElementById('receipt-file-input').addEventListener('change', (e) => handleReceiptFile(e.target.files[0]));
document.getElementById('receipt-upload-input').addEventListener('change', (e) => handleReceiptFile(e.target.files[0]));

function defaultState(){
  const now = new Date();
  return {
    year: now.getFullYear(),
    month: now.getMonth(),
    rev: 0,
    adjLabel: 'Ghost Funds (unaccounted)',
    adjAmount: 0,
    dashLabels: { balance: 'BALANCE', income: 'INCOME', expenses: 'EXPENSES' },
    dashOverrides: { balance: null, income: null, expenses: null },
    bills: DEFAULT_BILLS.map(b => ({...b, id: uid(), budget: null, paidAt: null})),
    income: DEFAULT_INCOME.map(i => ({...i, id: uid()})),
  };
}

// Paints instantly from whatever this device last saw, before Firebase responds.
function ensureStateDefaults(s){
  if (typeof s.adjAmount !== 'number') s.adjAmount = 0;
  if (typeof s.adjLabel !== 'string') s.adjLabel = 'Ghost Funds (unaccounted)';
  if (!s.dashLabels) s.dashLabels = { balance: 'BALANCE', income: 'INCOME', expenses: 'EXPENSES' };
  if (!s.dashOverrides) s.dashOverrides = { balance: null, income: null, expenses: null };
  return s;
}

function load(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : defaultState();
    if (!state || !state.bills || !state.income) state = defaultState();
    if (typeof state.rev !== 'number') state.rev = 0;
    ensureStateDefaults(state);
  } catch(e){ state = defaultState(); }
  try {
    const rawH = localStorage.getItem(HISTORY_KEY);
    history = rawH ? JSON.parse(rawH) : [];
  } catch(e){ history = []; }
}

function isInputActive(){
  const el = document.activeElement;
  if (!el || el.tagName !== 'INPUT') return false;
  return el.classList.contains('name-input') || el.classList.contains('amount-input') ||
         el.classList.contains('due-input') || el.classList.contains('item-desc-input') ||
         el.id === 'bill-add-name' || el.id === 'bill-add-amount' ||
         el.id === 'income-add-name' || el.id === 'income-add-amount' ||
         el.id === 'adj-label-input' || el.id === 'adj-amount-input' ||
         el.id === 'label-balance' || el.id === 'label-income' || el.id === 'label-expenses' ||
         el.id === 'sum-balance' || el.id === 'sum-income' || el.id === 'sum-expenses';
}

// Debounced write — used while typing, so we don't hammer the database every keystroke.
function save(){
  state.rev = (state.rev || 0) + 1;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    stateRef.set(JSON.parse(JSON.stringify(state))).catch(err => console.error('Ledger sync (save) failed:', err));
  }, 400);
}
// Immediate write — used for discrete actions (stamp, add, remove, close month).
function saveNow(){
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  state.rev = (state.rev || 0) + 1;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  stateRef.set(JSON.parse(JSON.stringify(state))).catch(err => console.error('Ledger sync (saveNow) failed:', err));
}
function saveHistory(){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  historyRef.set(JSON.parse(JSON.stringify(history))).catch(err => console.error('Ledger sync (history) failed:', err));
}

// Applies data arriving from Firebase (Claudia's device, or the echo of our own write).
// If a field is actively being typed into, the update is held until it's safe to apply.
function applyRemoteState(remote){
  if (!remote) { stateRef.set(JSON.parse(JSON.stringify(state))).catch(err => console.error('Ledger sync (seed) failed:', err)); return; }
  const remoteRev = typeof remote.rev === 'number' ? remote.rev : 0;
  const localRev = typeof state.rev === 'number' ? state.rev : 0;
  if (remoteRev < localRev) return; // stale echo — a newer local change is already showing, ignore it
  if (isInputActive()) { pendingRemoteState = remote; return; }
  state = remote;
  ensureStateDefaults(state);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
}
function applyRemoteHistory(remote){
  const next = Array.isArray(remote) ? remote : [];
  if (isInputActive()) { pendingRemoteHistory = next; return; }
  history = next;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
  document.getElementById('history-count').textContent = history.length;
}

document.addEventListener('focusout', () => {
  setTimeout(() => {
    if (isInputActive()) return;
    if (pendingRemoteState) {
      const remoteRev = typeof pendingRemoteState.rev === 'number' ? pendingRemoteState.rev : 0;
      const localRev = typeof state.rev === 'number' ? state.rev : 0;
      if (remoteRev >= localRev) { state = pendingRemoteState; localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); render(); }
      pendingRemoteState = null;
    }
    if (pendingRemoteHistory) { history = pendingRemoteHistory; pendingRemoteHistory = null; localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); renderHistory(); document.getElementById('history-count').textContent = history.length; }
  }, 50);
});

function render(){
  document.getElementById('month-title').textContent = monthLabel(state.year, state.month);

  const billsList = document.getElementById('bills-list');
  billsList.innerHTML = '';
  state.bills.forEach(b => billsList.appendChild(renderBillRow(b)));

  renderIncomeList();

  updateSummary();

  document.getElementById('history-count').textContent = history.length;
  renderHistory();

  const analysisBody = document.getElementById('analysis-section-body');
  if (analysisBody && analysisBody.style.display !== 'none') renderAnalysis();
}

// Lightweight refresh of just the totals card — safe to call on every keystroke
// since it never touches the row inputs, so focus/cursor position is preserved.
function updateSummary(){
  const totalExpenses = round2(state.bills.reduce((s,b)=>s+(Number(b.amount)||0),0));
  const paidTotal = round2(state.bills.filter(b=>b.paid).reduce((s,b)=>s+(Number(b.amount)||0),0));
  const totalIncome = round2(state.income.reduce((s,i)=>s+(Number(i.amount)||0),0));
  const receivedTotal = round2(state.income.reduce((s,i) => s + incomeReceivedAmount(i), 0));
  const adj = round2(state.adjAmount);
  const actualBalance = round2(receivedTotal - paidTotal + adj);
  const pct = totalExpenses > 0 ? Math.round((paidTotal/totalExpenses)*100) : 0;

  const ov = state.dashOverrides || {};
  const incomeVal = ov.income != null ? round2(ov.income) : totalIncome;
  const expensesVal = ov.expenses != null ? round2(ov.expenses) : totalExpenses;
  const balanceVal = ov.balance != null ? round2(ov.balance) : actualBalance;

  const incomeEl = document.getElementById('sum-income');
  const expensesEl = document.getElementById('sum-expenses');
  const balEl = document.getElementById('sum-balance');
  if (document.activeElement !== incomeEl) incomeEl.value = incomeVal ? fmtPlain(incomeVal) : '';
  if (document.activeElement !== expensesEl) expensesEl.value = expensesVal ? fmtPlain(expensesVal) : '';
  if (document.activeElement !== balEl) balEl.value = (balanceVal || balanceVal === 0) ? fmtPlain(balanceVal) : '';
  balEl.style.color = balanceVal >= 0 ? '#4FAE7A' : '#E2555A';

  document.getElementById('reset-income').classList.toggle('visible', ov.income != null);
  document.getElementById('reset-expenses').classList.toggle('visible', ov.expenses != null);
  document.getElementById('reset-balance').classList.toggle('visible', ov.balance != null);

  document.getElementById('progress-fill').style.width = pct + '%';
  let captionHtml =
    `<div class="caption-item"><span class="caption-dot">•</span>${fmt(receivedTotal)} of ${fmt(totalIncome)} income received</div>` +
    `<div class="caption-item"><span class="caption-dot">•</span>${fmt(paidTotal)} of ${fmt(totalExpenses)} bills paid</div>`;
  if (adj !== 0) captionHtml += `<div class="caption-item"><span class="caption-dot">•</span>${fmt(adj)} adjustment applied</div>`;
  document.getElementById('progress-caption').innerHTML = captionHtml;

  const adjLabelEl = document.getElementById('adj-label-input');
  const adjAmountEl = document.getElementById('adj-amount-input');
  if (document.activeElement !== adjLabelEl) adjLabelEl.value = state.adjLabel || '';
  if (document.activeElement !== adjAmountEl) adjAmountEl.value = adj ? adj : '';

  const labelBalEl = document.getElementById('label-balance');
  const labelIncEl = document.getElementById('label-income');
  const labelExpEl = document.getElementById('label-expenses');
  if (document.activeElement !== labelBalEl) labelBalEl.value = (state.dashLabels && state.dashLabels.balance) || 'BALANCE';
  if (document.activeElement !== labelIncEl) labelIncEl.value = (state.dashLabels && state.dashLabels.income) || 'INCOME';
  if (document.activeElement !== labelExpEl) labelExpEl.value = (state.dashLabels && state.dashLabels.expenses) || 'EXPENSES';
}

let openItemPanels = new Set();

function itemsSum(b){
  return round2((b.items || []).reduce((s, x) => s + (Number(x.amount) || 0), 0));
}
function incomeReceivedAmount(i){
  if (i.items && i.items.length) return round2(i.items.filter(it=>it.received).reduce((s,it)=>s+(Number(it.amount)||0),0));
  return i.received ? round2(Number(i.amount)||0) : 0;
}

  `;
  wrapper.appendChild(row);

  const itemsPanel = document.createElement('div');

  const [nameInput, dueInput] = row.querySelectorAll('.name-input, .due-input');

  const itemsCountEl = row.querySelector('.items-count');
  const moveUpBtn = row.querySelector('.move-up');
  const moveDownBtn = row.querySelector('.move-down');

  const idx = state.bills.findIndex(x => x.id === b.id);
  moveUpBtn.disabled = idx <= 0;
  moveDownBtn.disabled = idx >= state.bills.length - 1;
  moveUpBtn.addEventListener('click', () => {
    const i = state.bills.findIndex(x => x.id === b.id);
    if (i > 0) { [state.bills[i-1], state.bills[i]] = [state.bills[i], state.bills[i-1]]; saveNow(); render(); }
  });
  moveDownBtn.addEventListener('click', () => {
    const i = state.bills.findIndex(x => x.id === b.id);
    if (i < state.bills.length - 1) { [state.bills[i+1], state.bills[i]] = [state.bills[i], state.bills[i+1]]; saveNow(); render(); }
  });

  function refreshAmountDisplay(){
    const hasItems = b.items && b.items.length > 0;
    if (hasItems) { b.amount = itemsSum(b); amountInput.value = b.amount ? b.amount : ''; amountInput.readOnly = true; }
    else { amountInput.readOnly = false; }
    itemsCountEl.textContent = hasItems ? `🧾 ${b.items.length} item${b.items.length>1?'s':''} · ${fmt(itemsSum(b))}` : '';
  }

  function renderItemsPanel(){
    itemsPanel.innerHTML = '';
    (b.items || []).forEach(it => {
      const itRow = document.createElement('div');

        <button class="item-remove-btn">✕</button>
      `;
      const descInput = itRow.querySelector('.item-desc-input');
      const amtInput = itRow.querySelector('.item-amount-input');

      });
      itemsPanel.appendChild(itRow);
    });

    const addRow = document.createElement('div');

    const addBtn = document.createElement('button');

      saveNow(); refreshAmountDisplay(); renderItemsPanel();
      const inputs = itemsPanel.querySelectorAll('.item-desc-input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    });
    addRow.appendChild(addBtn);

    const scanBtn = document.createElement('button');
    scanBtn.className = 'scan-btn';
    scanBtn.textContent = '📷 Take photo';
    scanBtn.addEventListener('click', () => {
      receiptCtx = { b, refreshAmountDisplay, renderItemsPanel, statusEl };
      document.getElementById('receipt-file-input').value = '';
      document.getElementById('receipt-file-input').click();
    });

    });
    addRow.appendChild(uploadBtn);
    itemsPanel.appendChild(addRow);

    statusEl.className = 'scan-status';

      subtotal.textContent = `Subtotal: ${fmt(itemsSum(b))}`;

  chevronBtn.addEventListener('click', () => {

    else { openItemPanels.delete(b.id); }
  });

  nameInput.addEventListener('input', e => { b.name = e.target.value; save(); });
  dueInput.addEventListener('input', e => { b.dueDay = parseInt(e.target.value) || 0; save(); });
  amountInput.addEventListener('input', e => { if (!amountInput.readOnly) { b.amount = parseFloat(e.target.value) || 0; save(); updateSummary(); } });
  stampBtn.addEventListener('click', () => {
    b.paid = !b.paid;
    b.paidAt = b.paid ? new Date().toISOString() : null;
    saveNow();
    stampBtn.classList.toggle('on', b.paid);
    stampBtn.textContent = b.paid ? '✓' : '';
    row.querySelector('.icon-wrap').classList.toggle('paid', b.paid);
    updateSummary();
  });
  removeBtn.addEventListener('click', () => { state.bills = state.bills.filter(x => x.id !== b.id); saveNow(); render(); });

  refreshAmountDisplay();
  if (openItemPanels.has(b.id)) {
    itemsPanel.classList.add('open');
    chevronBtn.textContent = '▾';
    renderItemsPanel();
  }
  return wrapper;
}

let openIncomeGroups = new Set();

function renderIncomeList(){
  const incomeList = document.getElementById('income-list');
  incomeList.innerHTML = '';
  const grouped = {};
  const groupOrder = [];
  const ungrouped = [];
  state.income.forEach(i => {
    if (i.group) {
      if (!grouped[i.group]) { grouped[i.group] = []; groupOrder.push(i.group); }
      grouped[i.group].push(i);
    } else {
      ungrouped.push(i);
    }
  });
  ungrouped.forEach(i => incomeList.appendChild(renderIncomeRow(i)));
  groupOrder.forEach(name => incomeList.appendChild(renderIncomeGroup(name, grouped[name])));
}

function renderIncomeGroup(name, items){
  const wrapper = document.createElement('div');
  wrapper.className = 'group-wrapper';
  const isOpen = openIncomeGroups.has(name);

  const header = document.createElement('div');
  header.className = 'group-header';
  const subtotal = items.reduce((s,i)=>s+(Number(i.amount)||0),0);
  header.innerHTML = `
    <button class="chevron-btn group-chevron">${isOpen ? '▾' : '▸'}</button>
    <input class="name-input group-name-input" style="flex:1;" value="${escapeAttr(name)}" />
    <span class="group-subtotal">${fmt(subtotal)}</span>
  `;
  wrapper.appendChild(header);

  const body = document.createElement('div');
  body.className = 'group-body' + (isOpen ? ' open' : '');
  items.forEach(i => body.appendChild(renderIncomeRow(i)));

  const addToGroupBtn = document.createElement('button');
  addToGroupBtn.className = 'item-add-btn';
  addToGroupBtn.textContent = `+ Add to ${name}`;
  addToGroupBtn.addEventListener('click', () => {
    state.income.push({ id: uid(), name: '', icon: guessIcon(name, true), amount: 0, received: false, group: name });
    openIncomeGroups.add(name);
    saveNow();
    renderIncomeList();
    setTimeout(() => {
      const inputs = document.querySelectorAll('.group-body.open .name-input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 0);
  });
  body.appendChild(addToGroupBtn);
  wrapper.appendChild(body);

  header.querySelector('.group-chevron').addEventListener('click', () => {
    const open = body.classList.toggle('open');
    header.querySelector('.group-chevron').textContent = open ? '▾' : '▸';
    if (open) openIncomeGroups.add(name); else openIncomeGroups.delete(name);
  });

  header.querySelector('.group-name-input').addEventListener('blur', (e) => {
    const newName = e.target.value.trim();
    if (newName && newName !== name) {
      state.income.forEach(i => { if (i.group === name) i.group = newName; });
      if (openIncomeGroups.has(name)) { openIncomeGroups.delete(name); openIncomeGroups.add(newName); }
      saveNow();
      renderIncomeList();
    }
  });

  return wrapper;
}

function renderIncomeRow(i){
  const wrapper = document.createElement('div');

  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <button class="chevron-btn">▸</button>
    <div class="icon-wrap ${i.received ? 'received' : ''}">${i.icon || '💵'}</div>
    <div class="row-main">
      <input class="name-input" value="${escapeAttr(i.name)}" />
      <div class="items-count"></div>
    </div>
    <div class="amount-wrap"><span class="currency">$</span><input class="amount-input" type="number" inputmode="decimal" value="${i.amount ? i.amount : ''}" placeholder="0" /></div>
    <button class="stamp-btn ${i.received ? 'on' : ''}">${i.received ? '✓' : ''}</button>
    <button class="remove-btn">✕</button>
  `;
  wrapper.appendChild(row);

  const itemsPanel = document.createElement('div');
  itemsPanel.className = 'items-panel';
  wrapper.appendChild(itemsPanel);

  const nameInput = row.querySelector('.name-input');
  const amountInput = row.querySelector('.amount-input');
  const stampBtn = row.querySelector('.stamp-btn');
  const removeBtn = row.querySelector('.remove-btn');
  const chevronBtn = row.querySelector('.chevron-btn');
  const itemsCountEl = row.querySelector('.items-count');

  function refreshAmountDisplay(){
    const hasItems = i.items && i.items.length > 0;
    if (hasItems) { i.amount = itemsSum(i); amountInput.value = i.amount ? i.amount : ''; amountInput.readOnly = true; }
    else { amountInput.readOnly = false; }
    itemsCountEl.textContent = hasItems ? `🧾 ${i.items.length} entr${i.items.length>1?'ies':'y'} · ${fmt(itemsSum(i))}` : '';
  }

  function refreshReceivedDisplay(){
    const hasItems = i.items && i.items.length > 0;
    const on = hasItems ? i.items.every(it => it.received) : !!i.received;
    stampBtn.classList.toggle('on', on);
    stampBtn.textContent = on ? '✓' : '';
    row.querySelector('.icon-wrap').classList.toggle('received', on);
  }

  function renderItemsPanel(){
    itemsPanel.innerHTML = '';
    (i.items || []).forEach(it => {
      const itRow = document.createElement('div');
      itRow.className = 'item-row';
      itRow.innerHTML = `
        <input class="item-desc-input" value="${escapeAttr(it.desc)}" placeholder="e.g. pay date or note" />
        <div class="amount-wrap"><span class="currency">$</span><input class="amount-input item-amount-input" type="number" inputmode="decimal" value="${it.amount ? it.amount : ''}" placeholder="0" style="width:62px;" /></div>
        <button class="stamp-btn item-stamp-btn ${it.received ? 'on' : ''}" style="width:22px;height:22px;">${it.received ? '✓' : ''}</button>
        <button class="item-remove-btn">✕</button>
      `;
      const descInput = itRow.querySelector('.item-desc-input');
      const amtInput = itRow.querySelector('.item-amount-input');
      const itemStampBtn = itRow.querySelector('.item-stamp-btn');
      const remBtn = itRow.querySelector('.item-remove-btn');
      descInput.addEventListener('input', e => { it.desc = e.target.value; save(); });
      amtInput.addEventListener('input', e => { it.amount = parseFloat(e.target.value) || 0; save(); refreshAmountDisplay(); updateSummary(); });
      itemStampBtn.addEventListener('click', () => {
        it.received = !it.received; saveNow();
        itemStampBtn.classList.toggle('on', it.received);
        itemStampBtn.textContent = it.received ? '✓' : '';
        refreshReceivedDisplay();
        updateSummary();
      });
      remBtn.addEventListener('click', () => {
        i.items = i.items.filter(x => x.id !== it.id);
        saveNow(); refreshAmountDisplay(); refreshReceivedDisplay(); updateSummary(); renderItemsPanel();
      });
      itemsPanel.appendChild(itRow);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'item-add-btn';
    addBtn.textContent = '+ Add entry';
    addBtn.addEventListener('click', () => {
      if (!i.items) i.items = [];
      i.items.push({ id: uid(), desc: '', amount: 0, received: false });
      saveNow(); refreshAmountDisplay(); refreshReceivedDisplay(); renderItemsPanel();
      const inputs = itemsPanel.querySelectorAll('.item-desc-input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    });
    itemsPanel.appendChild(addBtn);

    if (i.items && i.items.length) {
      const subtotal = document.createElement('div');
      subtotal.className = 'item-subtotal';
      subtotal.textContent = `Subtotal: ${fmt(itemsSum(i))} · tap each ✓ as it hits the account`;
      itemsPanel.appendChild(subtotal);
    }
  }

  chevronBtn.addEventListener('click', () => {
    const open = itemsPanel.classList.toggle('open');
    chevronBtn.textContent = open ? '▾' : '▸';
    if (open) { openItemPanels.add(i.id); renderItemsPanel(); }
    else { openItemPanels.delete(i.id); }
  });

  nameInput.addEventListener('input', e => { i.name = e.target.value; save(); });
  amountInput.addEventListener('input', e => { if (!amountInput.readOnly) { i.amount = parseFloat(e.target.value) || 0; save(); updateSummary(); } });
  stampBtn.addEventListener('click', () => {
    const hasItems = i.items && i.items.length > 0;
    if (hasItems) {
      const allReceived = i.items.every(it => it.received);
      i.items.forEach(it => { it.received = !allReceived; });
      saveNow();
      renderItemsPanel();
    } else {
      i.received = !i.received;
      saveNow();
    }
    refreshReceivedDisplay();
    updateSummary();
  });
  removeBtn.addEventListener('click', () => { state.income = state.income.filter(x => x.id !== i.id); saveNow(); render(); });

  refreshAmountDisplay();
  refreshReceivedDisplay();
  if (openItemPanels.has(i.id)) {
    itemsPanel.classList.add('open');
    chevronBtn.textContent = '▾';
    renderItemsPanel();
  }
  return wrapper;
}

function escapeAttr(s){
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function closeMonth(){
  const totalExpenses = round2(state.bills.reduce((s,b)=>s+(Number(b.amount)||0),0));
  const totalIncome = round2(state.income.reduce((s,i)=>s+(Number(i.amount)||0),0));
  const adj = round2(state.adjAmount);
  const balance = round2(totalIncome - totalExpenses + adj);
  const label = monthLabel(state.year, state.month);

  const billsSnapshot = state.bills.map(b => ({
    name: b.name, amount: round2(b.amount), paid: !!b.paid, dueDay: b.dueDay || 0,
    paidAt: b.paidAt || null, budget: (b.budget != null ? round2(b.budget) : null),
  }));
  const incomeSnapshot = state.income.map(i => ({
    name: i.name, group: i.group || null, expected: round2(i.amount),
    received: round2(incomeReceivedAmount(i)),
  }));

  history.unshift({
    key: state.year + '-' + String(state.month+1).padStart(2,'0'),
    label, income: totalIncome, expenses: totalExpenses, balance, adj,
    bills: billsSnapshot, incomeItems: incomeSnapshot,
    closedAt: new Date().toISOString(),
  });
  history = history.slice(0, 24);
  saveHistory();

  let nextMonth = state.month + 1, nextYear = state.year;
  if (nextMonth > 11) { nextMonth = 0; nextYear += 1; }

  const resetBills = state.bills.map(b => ({...b, paid:false, paidAt:null, items:[]}));
  let carryIncome = state.income.filter(i => i.icon !== '🐷').map(i => ({...i, received:false, items:[]}));
  if (balance !== 0) {
    carryIncome.unshift({id: uid(), name: 'Savings carried from ' + label, icon:'🐷', amount: balance, received:true});
  }

  state = { year: nextYear, month: nextMonth, rev: state.rev, adjLabel: 'Ghost Funds (unaccounted)', adjAmount: 0, dashLabels: state.dashLabels, dashOverrides: { balance: null, income: null, expenses: null }, bills: resetBills, income: carryIncome };
  saveNow();
  render();
}

function buildTrendSVG(points){
  const wrap = document.createElement('div');
  wrap.className = 'trend-chart-wrap';

  const w = Math.max(320, points.length * 70);
  const h = 160;
  const padL = 12, padR = 12, padT = 12, padB = 22;
  const allVals = points.flatMap(p => [p.income, p.expenses, p.balance]);
  const maxV = Math.max(...allVals, 0);
  const minV = Math.min(...allVals, 0);
  const range = (maxV - minV) || 1;
  const xStep = points.length > 1 ? (w - padL - padR) / (points.length - 1) : 0;
  const yFor = (v) => padT + (1 - (v - minV) / range) * (h - padT - padB);
  const xFor = (idx) => padL + idx * xStep;
  const pathFor = (key) => points.map((p,idx) => `${idx===0?'M':'L'} ${xFor(idx).toFixed(1)} ${yFor(p[key]).toFixed(1)}`).join(' ');
  const zeroY = yFor(0);

  let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;">`;
  svg += `<line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${w-padR}" y2="${zeroY.toFixed(1)}" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>`;
  svg += `<path d="${pathFor('income')}" fill="none" stroke="#4FAE7A" stroke-width="2"/>`;
  svg += `<path d="${pathFor('expenses')}" fill="none" stroke="#E8A33D" stroke-width="2"/>`;
  svg += `<path d="${pathFor('balance')}" fill="none" stroke="#5DA9E9" stroke-width="2.5"/>`;
  points.forEach((p, idx) => {
    const x = xFor(idx);
    svg += `<circle cx="${x.toFixed(1)}" cy="${yFor(p.balance).toFixed(1)}" r="3" fill="#5DA9E9" ${p.open?'opacity="0.5"':''}/>`;
    svg += `<text x="${x.toFixed(1)}" y="${h-6}" font-size="9" fill="#5A7DA0" text-anchor="middle" font-family="'IBM Plex Mono',monospace">${escapeAttr((p.label||'').split(' ')[0].slice(0,3))}</text>`;
  });
  svg += `</svg>`;
  wrap.innerHTML = svg;

  const legend = document.createElement('div');
  legend.className = 'trend-legend';
  legend.innerHTML =
    `<span class="trend-legend-item"><span class="trend-legend-dot" style="background:#4FAE7A"></span>Income</span>` +
    `<span class="trend-legend-item"><span class="trend-legend-dot" style="background:#E8A33D"></span>Expenses</span>` +
    `<span class="trend-legend-item"><span class="trend-legend-dot" style="background:#5DA9E9"></span>Balance</span>`;
  wrap.appendChild(legend);
  return wrap;
}

function renderAnalysis(){
  const body = document.getElementById('analysis-section-body');
  body.innerHTML = '';

  // 1. Category breakdown — this month
  const catBlock = document.createElement('div');
  catBlock.className = 'analysis-block';
  catBlock.innerHTML = '<div class="analysis-title">CATEGORY BREAKDOWN — THIS MONTH</div>';
  const catsWithAmount = state.bills.filter(b => (Number(b.amount)||0) > 0).slice().sort((a,b)=>b.amount-a.amount);
  const totalCat = catsWithAmount.reduce((s,b)=>s+(Number(b.amount)||0),0);
  if (!catsWithAmount.length) {
    catBlock.innerHTML += '<div class="analysis-empty">No bill amounts entered yet this month.</div>';
  } else {
    catsWithAmount.forEach(b => {
      const pct = totalCat > 0 ? Math.round((b.amount/totalCat)*100) : 0;
      const row = document.createElement('div');
      row.className = 'cat-bar-row';
      row.innerHTML = `<div class="cat-bar-label"><span>${b.icon||''} ${escapeAttr(b.name)}</span><span>${fmt(b.amount)} · ${pct}%</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>`;
      catBlock.appendChild(row);
    });
  }
  body.appendChild(catBlock);

  // 2. Trend over time
  const trendBlock = document.createElement('div');
  trendBlock.className = 'analysis-block';
  trendBlock.innerHTML = '<div class="analysis-title">TREND — INCOME vs EXPENSES vs BALANCE</div>';
  const trendPoints = history.slice().reverse().map(h => ({label: h.label, income: h.income, expenses: h.expenses, balance: h.balance}));
  const liveIncome = round2(state.income.reduce((s,i)=>s+(Number(i.amount)||0),0));
  const liveExpenses = round2(state.bills.reduce((s,b)=>s+(Number(b.amount)||0),0));
  const liveBalance = round2(liveIncome - liveExpenses + (Number(state.adjAmount)||0));
  trendPoints.push({label: monthLabel(state.year,state.month) + ' (open)', income: liveIncome, expenses: liveExpenses, balance: liveBalance, open:true});
  if (trendPoints.length < 2) {
    trendBlock.innerHTML += '<div class="analysis-empty">Close out at least one more month to see a trend line.</div>';
  } else {
    trendBlock.appendChild(buildTrendSVG(trendPoints));
  }
  body.appendChild(trendBlock);

  // 3. Ghost Funds accountability
  const ghostBlock = document.createElement('div');
  ghostBlock.className = 'analysis-block';
  ghostBlock.innerHTML = '<div class="analysis-title">👻 GHOST FUNDS ACCOUNTABILITY</div>';
  const ghostMonths = history.filter(h => (h.adj||0) !== 0);
  const ghostTotal = round2(ghostMonths.reduce((s,h)=>s+(h.adj||0),0));
  const currentAdj = Number(state.adjAmount)||0;
  if (ghostMonths.length === 0 && currentAdj === 0) {
    ghostBlock.innerHTML += '<div class="analysis-empty">No unaccounted adjustments logged in your closed months yet.</div>';
  } else {
    let ghostHtml = `<div class="ghost-summary-card">Needed in <b>${ghostMonths.length} of your last ${history.length}</b> closed month${history.length===1?'':'s'}, totaling <b>${fmt(ghostTotal)}</b>.`;
    if (currentAdj !== 0) ghostHtml += ` This open month is currently carrying <b>${fmt(currentAdj)}</b> unaccounted too.`;
    ghostHtml += ghostMonths.length >= 3 ? ' That\'s a recurring pattern — worth digging into where it\'s actually coming from.' : '';
    ghostHtml += '</div>';
    ghostBlock.innerHTML += ghostHtml;
  }
  body.appendChild(ghostBlock);

  // 4. Category budgets
  const budgetBlock = document.createElement('div');
  budgetBlock.className = 'analysis-block';
  budgetBlock.innerHTML = '<div class="analysis-title">🎯 CATEGORY BUDGETS</div>';
  if (!state.bills.length) {
    budgetBlock.innerHTML += '<div class="analysis-empty">Add bills to set budgets for them.</div>';
  } else {
    state.bills.forEach(b => {
      const row = document.createElement('div');
      row.className = 'budget-row';
      const hasBudget = b.budget != null;
      const delta = hasBudget ? round2(b.budget - (Number(b.amount)||0)) : null;
      const deltaColor = delta == null ? '#5A7DA0' : (delta >= 0 ? '#4FAE7A' : '#E2555A');
      const deltaText = delta == null ? 'no target' : (delta >= 0 ? 'under ' + fmt(delta) : 'over ' + fmt(Math.abs(delta)));
      row.innerHTML = `<span class="budget-name">${b.icon||''} ${escapeAttr(b.name)}</span><div class="amount-wrap"><span class="currency">$</span><input class="budget-input" type="number" inputmode="decimal" value="${hasBudget?b.budget:''}" placeholder="target"></div><span class="budget-delta" style="color:${deltaColor}">${deltaText}</span>`;
      const input = row.querySelector('.budget-input');
      input.addEventListener('input', e => {
        b.budget = e.target.value === '' ? null : (parseFloat(e.target.value) || 0);
        save();
        const d = b.budget != null ? round2(b.budget - (Number(b.amount)||0)) : null;
        const deltaEl = row.querySelector('.budget-delta');
        deltaEl.style.color = d == null ? '#5A7DA0' : (d >= 0 ? '#4FAE7A' : '#E2555A');
        deltaEl.textContent = d == null ? 'no target' : (d >= 0 ? 'under ' + fmt(d) : 'over ' + fmt(Math.abs(d)));
      });
      budgetBlock.appendChild(row);
    });
  }
  body.appendChild(budgetBlock);

  // 5. Bill punctuality (tracked forward from now — needs a paid date + due day recorded)
  const punctBlock = document.createElement('div');
  punctBlock.className = 'analysis-block';
  punctBlock.innerHTML = '<div class="analysis-title">⏱️ BILL PUNCTUALITY</div>';
  const punctStats = {};
  history.forEach(h => {
    (h.bills||[]).forEach(b => {
      if (!b.paid || !b.paidAt || !b.dueDay) return;
      const paidDay = new Date(b.paidAt).getDate();
      const onTime = paidDay <= b.dueDay;
      if (!punctStats[b.name]) punctStats[b.name] = {onTime:0, late:0};
      punctStats[b.name][onTime ? 'onTime' : 'late']++;
    });
  });
  const punctNames = Object.keys(punctStats);
  if (!punctNames.length) {
    punctBlock.innerHTML += '<div class="analysis-empty">Starts tracking once you close a month with due-day bills marked paid. Nothing yet — this can\'t backfill past months.</div>';
  } else {
    punctNames.forEach(name => {
      const s = punctStats[name];
      const total = s.onTime + s.late;
      const pct = Math.round((s.onTime/total)*100);
      const row = document.createElement('div');
      row.className = 'reliability-row';
      row.innerHTML = `<span class="reliability-name">${escapeAttr(name)}</span><span class="reliability-pct" style="color:${pct>=80?'#4FAE7A':pct>=50?'#E8A33D':'#E2555A'}">${s.onTime}/${total} on-time (${pct}%)</span>`;
      punctBlock.appendChild(row);
    });
  }
  body.appendChild(punctBlock);

  // 6. Income reliability
  const relBlock = document.createElement('div');
  relBlock.className = 'analysis-block';
  relBlock.innerHTML = '<div class="analysis-title">💵 INCOME RELIABILITY</div>';
  const relStats = {};
  history.forEach(h => {
    (h.incomeItems||[]).forEach(i => {
      if (!i.expected) return;
      if (!relStats[i.name]) relStats[i.name] = {expected:0, received:0};
      relStats[i.name].expected += i.expected;
      relStats[i.name].received += i.received;
    });
  });
  const relNames = Object.keys(relStats);
  if (!relNames.length) {
    relBlock.innerHTML += '<div class="analysis-empty">Starts tracking once you close a month. Nothing yet.</div>';
  } else {
    relNames.forEach(name => {
      const s = relStats[name];
      const pct = s.expected > 0 ? Math.round((s.received/s.expected)*100) : 0;
      const row = document.createElement('div');
      row.className = 'reliability-row';
      row.innerHTML = `<span class="reliability-name">${escapeAttr(name)}</span><span class="reliability-pct" style="color:${pct>=95?'#4FAE7A':pct>=75?'#E8A33D':'#E2555A'}">${fmt(s.received)} of ${fmt(s.expected)} (${pct}%)</span>`;
      relBlock.appendChild(row);
    });
    const totalExp = relNames.reduce((s,n)=>s+relStats[n].expected,0);
    const totalRec = relNames.reduce((s,n)=>s+relStats[n].received,0);
    const overallPct = totalExp > 0 ? Math.round((totalRec/totalExp)*100) : 0;
    const note = document.createElement('div');
    note.className = 'analysis-subnote';
    note.textContent = `Overall: ${overallPct}% of expected income actually received, across closed months.`;
    relBlock.appendChild(note);
  }
  body.appendChild(relBlock);
}

function toggleHistory(){
  const list = document.getElementById('history-list');
  const chevron = document.getElementById('history-chevron');
  list.classList.toggle('open');
  chevron.textContent = list.classList.contains('open') ? '▴' : '▾';
}

function renderHistory(){
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">No closed months yet.</div>';
    return;
  }
  history.forEach(h => {
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `<span>${h.label}</span><span style="color:${h.balance >= 0 ? '#4FAE7A' : '#E2555A'}">${fmt(h.balance)} balance</span>`;
    list.appendChild(row);
  });
}

load();
render();

document.getElementById('adj-label-input').addEventListener('input', e => { state.adjLabel = e.target.value; save(); });
document.getElementById('adj-amount-input').addEventListener('input', e => { state.adjAmount = parseFloat(e.target.value) || 0; save(); updateSummary(); });
document.getElementById('income-add-group').addEventListener('change', e => {
  document.getElementById('income-add-group-new').style.display = e.target.value === '__new__' ? 'block' : 'none';
});

document.getElementById('label-balance').addEventListener('input', e => { state.dashLabels.balance = e.target.value; save(); });
document.getElementById('label-income').addEventListener('input', e => { state.dashLabels.income = e.target.value; save(); });
document.getElementById('label-expenses').addEventListener('input', e => { state.dashLabels.expenses = e.target.value; save(); });

function parseMoneyInput(v){
  const cleaned = String(v).replace(/,/g, '').trim();
  return cleaned === '' ? null : (parseFloat(cleaned) || 0);
}
function wireDashValueInput(id, overrideKey){
  const el = document.getElementById(id);
  el.addEventListener('focus', () => {
    // show raw editable digits (no commas) while typing
    const v = state.dashOverrides[overrideKey];
    el.value = (v == null) ? el.value.replace(/,/g, '') : v;
    el.select();
  });
  el.addEventListener('input', e => {
    state.dashOverrides[overrideKey] = parseMoneyInput(e.target.value);
    save();
  });
  el.addEventListener('blur', () => { updateSummary(); });
}
wireDashValueInput('sum-balance', 'balance');
wireDashValueInput('sum-income', 'income');
wireDashValueInput('sum-expenses', 'expenses');
document.getElementById('reset-balance').addEventListener('click', () => { state.dashOverrides.balance = null; saveNow(); updateSummary(); });
document.getElementById('reset-income').addEventListener('click', () => { state.dashOverrides.income = null; saveNow(); updateSummary(); });
document.getElementById('reset-expenses').addEventListener('click', () => { state.dashOverrides.expenses = null; saveNow(); updateSummary(); });

try {

    document.getElementById('income-section-body').style.display = 'none';

  }
} catch(e){}

const syncDot = document.getElementById('sync-dot');
const syncLabel = document.getElementById('sync-label');

connectedRef.on('value', (snap) => {
  if (snap.val() === true) {
    syncDot.style.background = '#4FAE7A';
    syncLabel.textContent = 'synced';
  } else {

    syncLabel.textContent = 'offline · saved on this device';

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('ledger-sw.js', { scope: 'monthly-ledger.html' }).catch(() => {});
  });
}
